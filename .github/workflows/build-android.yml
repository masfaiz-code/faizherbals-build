name: Build Faiz Herbals APK

on:
  workflow_dispatch:
    inputs:
      publish_to_aptoide:
        description: 'Publish APK ke Aptoide Connect setelah build sukses'
        type: boolean
        required: false
        default: true
      aptoide_release_mode:
        description: 'Aptoide release mode'
        type: choice
        required: false
        default: IMMEDIATE
        options:
          - IMMEDIATE
          - MANUAL
      aptoide_news:
        description: 'Catatan rilis (locales[id_ID][news]) - kosongkan untuk skip'
        type: string
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: android-build-main-root-apk
  cancel-in-progress: false

jobs:
  build:
    name: Build Android artifact
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      artifact_name: ${{ steps.artifact.outputs.artifact_name }}
      source_sha: ${{ steps.source_meta.outputs.source_sha }}
    env:
      SOURCE_REPOSITORY: masfaiz-code/faizherbals-app
      SOURCE_REF: main
      PROJECT_PATH: faizherbals_toko

    steps:
      - name: Checkout build repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Checkout private source repository
        uses: actions/checkout@v5
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          ssh-key: ${{ secrets.SOURCE_REPO_SSH_KEY }}
          path: source
          fetch-depth: 1
          persist-credentials: false

      - name: Capture source metadata
        id: source_meta
        shell: bash
        run: |
          set -euo pipefail
          source_sha="$(git -C source rev-parse --short HEAD)"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"

      - name: Validate Flutter project path
        shell: bash
        run: |
          set -euo pipefail
          project_dir="$(realpath -m "source/${PROJECT_PATH}")"
          source_dir="$(realpath "source")"

          case "$project_dir" in
            "$source_dir"|"$source_dir"/*) ;;
            *)
              echo "Invalid project_path: ${PROJECT_PATH}"
              exit 1
              ;;
          esac

          test -f "$project_dir/pubspec.yaml"
          test -f "$project_dir/android/app/build.gradle.kts" || test -f "$project_dir/android/app/build.gradle"
          echo "PROJECT_DIR=$project_dir" >> "$GITHUB_ENV"

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.9
          channel: stable

      - name: Show toolchain versions
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          dart --version
          java -version

      - name: Restore Android signing files from secrets
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          {
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'storeFile=../upload-keystore.jks\n'
          } > android/key.properties

      - name: Install Flutter dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Build release APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter build apk --release

      - name: Build release AAB
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter build appbundle --release

      - name: Prepare artifact metadata
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="$RUNNER_TEMP/faizherbals-artifacts"
          apk_source="${PROJECT_DIR}/build/app/outputs/flutter-apk/app-release.apk"
          aab_source="${PROJECT_DIR}/build/app/outputs/bundle/release/app-release.aab"

          mkdir -p "$artifact_dir"
          test -f "$apk_source"
          test -f "$aab_source"

          apk_name="faizherbals-main-${{ steps.source_meta.outputs.source_sha }}.apk"
          aab_name="faizherbals-main-${{ steps.source_meta.outputs.source_sha }}.aab"
          cp "$apk_source" "$artifact_dir/$apk_name"
          cp "$aab_source" "$artifact_dir/$aab_name"

          artifact_name="faizherbals-main-${{ steps.source_meta.outputs.source_sha }}-android"
          echo "artifact_path=$artifact_dir" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: ${{ steps.artifact.outputs.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: release-artifact

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Android build #${{ github.run_number }}
          body: |
            Source repository: `masfaiz-code/faizherbals-app`
            Source ref: `main`
            Source commit: `${{ needs.build.outputs.source_sha }}`
            Project path: `faizherbals_toko`
            Artifact types: `apk`, `aab`
          files: release-artifact/*


  publish-aptoide:
    name: Publish APK to Aptoide
    needs: build
    if: ${{ inputs.publish_to_aptoide }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: aptoide-artifact

      - name: Locate APK file
        id: locate
        shell: bash
        run: |
          set -euo pipefail
          apk_path="$(find aptoide-artifact -maxdepth 2 -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "No APK file found in artifact directory."
            ls -laR aptoide-artifact || true
            exit 1
          fi
          echo "Found APK: $apk_path"
          ls -lh "$apk_path"
          echo "apk_path=$apk_path" >> "$GITHUB_OUTPUT"

      - name: Submit new version to Aptoide Connect
        env:
          APTOIDE_API_KEY: ${{ secrets.APTOIDE_API_KEY }}
          APK_PATH: ${{ steps.locate.outputs.apk_path }}
          RELEASE_MODE: ${{ inputs.aptoide_release_mode }}
          NEWS_TEXT: ${{ inputs.aptoide_news }}
          SOURCE_SHA: ${{ needs.build.outputs.source_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${APTOIDE_API_KEY:-}" ]; then
            echo "Secret APTOIDE_API_KEY belum diset di repository settings."
            echo "Generate API key di Aptoide Connect Developer Console -> API Keys"
            echo "lalu tambahkan sebagai secret APTOIDE_API_KEY di repo ini."
            exit 1
          fi

          curl_args=(
            -X POST
            --silent
            --show-error
            -H "Api-Key: ${APTOIDE_API_KEY}"
            -F "apk=@${APK_PATH}"
            -F "releaseMode=${RELEASE_MODE}"
          )

          if [ -n "${NEWS_TEXT}" ]; then
            curl_args+=( -F "locales[id_ID][news]=${NEWS_TEXT}" )
          fi

          response_body="$(mktemp)"
          http_code="$(curl "${curl_args[@]}" \
            --output "$response_body" \
            --write-out '%{http_code}' \
            https://uploader.catappult.io/api)"

          echo "HTTP status: $http_code"
          echo "--- Response body ---"
          cat "$response_body"
          echo
          echo "--- End response ---"

          case "$http_code" in
            2*)
              echo "Aptoide submission accepted (source commit: ${SOURCE_SHA})."
              ;;
            *)
              echo "Aptoide submission failed (HTTP ${http_code})."
              exit 1
              ;;
          esac
