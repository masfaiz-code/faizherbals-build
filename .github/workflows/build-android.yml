name: Build Faiz Herbals APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-build-main-root-apk
  cancel-in-progress: false

jobs:
  build:
    name: Build Android artifact
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      artifact_name: ${{ steps.artifact.outputs.artifact_name }}
      source_sha: ${{ steps.source_meta.outputs.source_sha }}
    env:
      SOURCE_REPOSITORY: masfaiz-code/faizherbals-app
      SOURCE_REF: main
      PROJECT_PATH: faizherbals_toko

    steps:
      - name: Checkout build repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Checkout private source repository
        uses: actions/checkout@v5
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          ssh-key: ${{ secrets.SOURCE_REPO_SSH_KEY }}
          path: source
          fetch-depth: 1
          persist-credentials: false

      - name: Capture source metadata
        id: source_meta
        shell: bash
        run: |
          set -euo pipefail
          source_sha="$(git -C source rev-parse --short HEAD)"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"

      - name: Validate Flutter project path
        shell: bash
        run: |
          set -euo pipefail
          project_dir="$(realpath -m "source/${PROJECT_PATH}")"
          source_dir="$(realpath "source")"

          case "$project_dir" in
            "$source_dir"|"$source_dir"/*) ;;
            *)
              echo "Invalid project_path: ${PROJECT_PATH}"
              exit 1
              ;;
          esac

          test -f "$project_dir/pubspec.yaml"
          test -f "$project_dir/android/app/build.gradle.kts" || test -f "$project_dir/android/app/build.gradle"
          echo "PROJECT_DIR=$project_dir" >> "$GITHUB_ENV"

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          cache: true

      - name: Show toolchain versions
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          dart --version
          java -version

      - name: Restore Android signing files from secrets
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          {
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'storeFile=../upload-keystore.jks\n'
          } > android/key.properties

      - name: Install Flutter dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Build release APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter build apk --release

      - name: Prepare artifact metadata
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          project_dir="${PROJECT_DIR}"
          artifact_rel_path="$project_dir/build/app/outputs/flutter-apk/app-release.apk"

          test -f "$artifact_rel_path"

          artifact_name="faizherbals-main-${{ steps.source_meta.outputs.source_sha }}.apk"
          echo "artifact_path=$artifact_rel_path" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: ${{ steps.artifact.outputs.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: release-artifact

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Android build #${{ github.run_number }}
          body: |
            Source repository: `masfaiz-code/faizherbals-app`
            Source ref: `main`
            Source commit: `${{ needs.build.outputs.source_sha }}`
            Project path: `faizherbals_toko`
            Artifact type: `apk`
          files: release-artifact/*
